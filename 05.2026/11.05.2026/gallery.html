<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Document</title>
    <style>
        div{
            float: left;
            height: 100px;
        }
        #l, #r{
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0 5px;
        }
    </style>
</head>
<body>
    <div>
        <div id="l" onclick="cos(1)"><</div>
        <div id="img"><img src="1.jpg" alt="" id="zdj"></div>
        <div id="r" onclick="cos(0)">></div>
        <input type="range" min="1" max="10" onchange="skip(this)">
    </div>
    <script>
        let img=1;
        let max=10
        function cos(przesuniecie){
            if(przesuniecie===1){
                if (img>1){
                    img--;
                }else{
                    img=max
                }
            }else{
                if(img===max){
                    img=1
                }else{
                    img++
                }
            }
            document.getElementById('zdj').src=img+".jpg"
        }
        function skip(number){
            document.getElementById('zdj').src=number.value+".jpg"
        }
    </script>
</body>
</html>
